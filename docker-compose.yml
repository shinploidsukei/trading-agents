services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  market_producer:
    build: ./market_producer
    container_name: market_producer
    command: python producer.py
    depends_on:
      - kafka

  trading_agent:
    build: ./trading_agent
    container_name: trading_agent
    depends_on:
      - kafka
      - postgres

  risk_manager:
    build: ./risk_manager
    container_name: risk_manager
    command: python risk_manager.py
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:9.5.7
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - postgres